<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>Bomberman 1v1 Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            border: 3px solid #e94560;
            border-radius: 4px;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.3);
            image-rendering: pixelated;
        }
        #loading-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000; color: #e94560; font-size: 24px;
        }
        #loading-screen .spinner {
            width: 50px; height: 50px;
            border: 4px solid #16213e;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Aviso de rotar pantalla en portrait */
        #rotate-notice {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            z-index: 9999;
            flex-direction: column;
            justify-content: center; align-items: center;
            color: #e94560; font-size: 20px; font-family: Arial, sans-serif;
            text-align: center; padding: 20px;
        }
        #rotate-notice .rotate-icon {
            font-size: 60px; margin-bottom: 20px;
            animation: rotate-pulse 1.5s ease-in-out infinite;
        }
        @keyframes rotate-pulse {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        @media (max-width: 800px) and (orientation: portrait) {
            #rotate-notice { display: flex !important; }
        }
    </style>
</head>
<body>
    <div id="rotate-notice">
        <div class="rotate-icon">📱↪️</div>
        <div>Gira tu dispositivo a<br><strong>modo horizontal</strong><br>para jugar Bomberman</div>
    </div>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div>Cargando Bomberman...</div>
    </div>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
